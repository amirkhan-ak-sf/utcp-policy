version: "3.3"

services:
  local-flex:
    image: mulesoft/flex-gateway:latest
    platform: linux/amd64
    environment:
      LOG_LEVEL: debug
      FLEX_LOG_LEVEL: 7
    ports:
      - 8081:8081
    volumes:
      - ./config:/usr/local/share/mulesoft/flex-gateway/conf.d/
  backend:
    # httpbin echoes the request back as JSON so we can verify the
    # x-utcp-tool tagging and validation short-circuits without needing
    # a real upstream tool service.
    image: kennethreitz/httpbin
    platform: linux/amd64
