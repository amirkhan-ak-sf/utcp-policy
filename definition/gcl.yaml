---
apiVersion: gateway.mulesoft.com/v1alpha1
kind: Extension
metadata:
  labels:
    title: UTCP Bridge
    description: |
      Universal Tool Calling Protocol (UTCP) gateway-side validator and
      tagger.

      Hosts a UTCP "Manual" at a discovery path (default `/utcp`) and
      validates inbound agent traffic against the configured `tools[]`
      list. Each tool maps to one HTTP route (method + path) on this
      API instance. The policy does not issue outbound HTTP itself —
      after validation it lets Flex Gateway forward the request to the
      API instance's configured implementation URI as usual, so the
      same network path the API instance already uses is the one the
      tool calls travel over.

      One UTCP Bridge policy fronts one API instance / one upstream.
      Multi-upstream agent surfaces are composed by stacking UTCP
      Bridge on each API instance and federating the Manuals at a
      higher layer.

      Validates inbound calls: the request must correspond to a declared
      tool and (when `validateInputs=true`) satisfy the tool's JSON
      Schema. Tags every successfully matched request with an
      `x-utcp-tool` header so downstream rate-limit and audit policies
      can scope by tool name.

      Authentication of the agent is delegated to other Omni Gateway
      policies (JWT, OAuth2, mTLS) configured upstream of this one in
      the policy chain; authorization to call the upstream is whatever
      the agent passes through (Authorization, x-api-key, ...).
    category: Transformation
    metadata/interfaceScope: api,resource
    metadata/capabilities/injectionPoint: inbound
spec:
  extends:
    - name: extension-definition
      namespace: default
  properties:
    discoveryPath:
      type: string
      default: "/utcp"
      description: |
        Path the policy serves the UTCP Manual on. Convention is `/utcp`.
        `GET <discoveryPath>` short-circuits and returns the Manual JSON;
        the request never reaches any upstream.
    apiInstanceProxyPath:
      type: string
      default: ""
      description: |
        Optional path prefix that the bridge API instance proxies under
        (the listener-path component of its consumer URL). When set, the
        policy strips this prefix from the inbound request path before
        matching against tool paths. Example: bridge consumer URL is
        `https://gw/erp-utcp/`, tool path is `/sap-orders/api/order`.
        Set `apiInstanceProxyPath=/erp-utcp` so the inbound path
        `/erp-utcp/sap-orders/api/order` matches the tool. Leave empty
        if the bridge is mounted at root.
    egressBaseUrl:
      type: string
      format: service
      description: |
        Host-only base URL used for outbound tool calls. Registered as
        an Envoy upstream cluster (host-only, no path). Typically the
        gateway's own external hostname so the bridge stacks against
        sibling API instances on the same gateway and tool calls travel
        the gateway's normal routing path. Each matched tool's `path`
        is appended verbatim to this host when forwarding.
    outboundTimeoutMs:
      type: integer
      minimum: 100
      maximum: 600000
      default: 30000
      description: |
        Per-call timeout (ms) on outbound tool requests to
        `egressBaseUrl`.
    publicBaseUrl:
      type: string
      default: ""
      description: |
        Public consumer URL of the API instance, used to compose
        `tool_call_template.url` in the served Manual so agents know the
        public address to invoke. Typically `https://<gateway>/<proxy>`.
        When empty, the Manual emits relative URLs (just the tool path).
    utcpVersion:
      type: string
      default: "1.0.1"
      description: |
        Value emitted as `utcp_version` in the served Manual. Should
        reflect the UTCP spec version this policy actually targets.
    manualTitle:
      type: string
      default: ""
      description: |
        `info.title` of the synthesised Manual. Optional. Empty string
        omits the field from the served JSON.
    manualInfoVersion:
      type: string
      default: ""
      description: |
        `info.version` of the synthesised Manual. Optional.
    manualDescription:
      type: string
      default: ""
      description: |
        `info.description` of the synthesised Manual. Optional.
    tools:
      type: array
      default: []
      description: |
        Tools served by this API instance. In API Manager this renders
        as a list with an Add button: each entry is one tool. Every
        tool maps to one HTTP route (method + path) the API instance
        already accepts; the policy validates the inbound request, tags
        it, and lets Flex Gateway forward as normal.
      items:
        type: object
        required:
          - name
          - path
        properties:
          name:
            type: string
            description: |
              Tool name. Used to route inbound requests and emitted on
              the `<toolHeaderName>` header (default `x-utcp-tool`).
              Must be unique within the policy.
          description:
            type: string
            default: ""
            description: |
              Free-form description. Surfaces to agents in the Manual.
          method:
            type: string
            default: "POST"
            description: |
              HTTP method. Common values: GET, POST, PUT, PATCH, DELETE.
          path:
            type: string
            description: |
              Path on the API instance (after `apiInstanceProxyPath`
              stripping). May contain RFC 6570 path templates for path
              parameters: `/users/{id}`. The `{id}` value is pulled
              from the inbound request path and exposed to schema
              validation under that key.
          contentType:
            type: string
            default: "application/json"
            description: |
              Content-Type advertised in the served Manual for this
              tool.
          bodyField:
            type: string
            default: "body"
            description: |
              Inputs-schema field name that carries the request body.
              Default `body`. Set empty to indicate the tool has no
              request body.
          inputs:
            type: string
            default: ""
            description: |
              JSON Schema for the tool's inputs, as a JSON string. The
              policy validates the inbound request against this schema
              (subject to `validateInputs`). Typical shape:
              `{"type":"object","required":["body"],"properties":{"body":{"type":"object",...}}}`.
              Empty string disables validation for this tool.
    enforcementMode:
      type: string
      enum:
        - strict
        - permissive
      default: strict
      description: |
        `strict`: requests whose `(method, path)` does not correspond to
          any declared tool are rejected with HTTP 404
          `utcp.tool_not_declared`.
        `permissive`: unmatched requests pass through to the upstream
          and the audit log records `utcp.unmatched=true` so operators
          can observe drift between agent traffic and the Manual.
    validateInputs:
      type: boolean
      default: true
      description: |
        Validate the request body / query / path / header against the
        matched tool's `inputs` JSON Schema. When false, the policy
        only does routing and tagging — useful when the schemas are
        noisy and the operator wants observability without enforcement.
    maxBodyBytes:
      type: integer
      minimum: 1024
      maximum: 52428800
      default: 1048576
      description: |
        Cap on the request body size when body validation is enabled.
        Bodies larger than this are rejected with HTTP 413
        `utcp.body_too_large`. Default 1 MiB; max 50 MiB.
    requirePrincipal:
      type: boolean
      default: false
      description: |
        When true, requests with no principal header are rejected with
        HTTP 401 `utcp.unauthenticated`. Use with an upstream auth
        policy (JWT, API Key) that populates `principalHeader`.
    principalHeader:
      type: string
      default: "x-anypoint-client-id"
      description: |
        Inbound header that carries the authenticated principal. Used
        in audit logs and for the `requirePrincipal` enforcement check.
    cacheControlHeader:
      type: string
      default: "public, max-age=60"
      description: |
        `Cache-Control` header value applied to the served Manual. Set
        to a stricter value like `no-store` when the Manual changes
        often.
    toolHeaderName:
      type: string
      default: "x-utcp-tool"
      description: |
        Name of the request header set on the request after a
        successful tool match. Audit logs and downstream observability
        can read this to scope per-tool.
    toolNamePrefix:
      type: string
      default: ""
      description: |
        Optional prefix prepended to every tool name in the served
        Manual. Lets multiple API instances share an agent without
        tool-name collisions (`paymentsApi.getUser` vs `crmApi.getUser`).
  required:
    - tools
    - egressBaseUrl
