---
apiVersion: gateway.mulesoft.com/v1alpha1
kind: Extension
metadata:
  labels:
    title: UTCP Bridge
    description: |
      Universal Tool Calling Protocol (UTCP) gateway-side validator and
      router.

      Hosts a UTCP "Manual" at a discovery path (default `/utcp`) and
      routes inbound agent traffic to one or more upstream services. The
      Manual is built from the configured `upstreams[]` — each upstream
      is a host (registered as a PDK Service so the gateway resolves DNS
      and TLS) and a list of tools. Each tool maps to one HTTP route
      (method + path) on the upstream and contributes one entry to the
      Manual's `tools[]` array. Inbound caller headers and request body
      are forwarded onward unchanged so upstream authorization /
      tracing flows through transparently.

      Validates inbound calls: the request must correspond to a declared
      tool and (when `validateInputs=true`) satisfy the tool's JSON
      Schema. Tags every successfully matched request with an
      `x-utcp-tool` header so downstream rate-limit and audit policies
      can scope by tool name.

      The policy never holds upstream credentials. Authentication of the
      agent itself is delegated to other Omni Gateway policies (JWT,
      OAuth2, mTLS) configured upstream of this one in the policy chain;
      authorization to call the upstream is whatever the agent passes
      through (Authorization, x-api-key, ...).
    category: Security
    metadata/interfaceScope: api,resource
    metadata/capabilities/injectionPoint: inbound
spec:
  extends:
    - name: extension-definition
      namespace: default
  properties:
    discoveryPath:
      type: string
      default: "/utcp"
      description: |
        Path the policy serves the UTCP Manual on. Convention is `/utcp`.
        `GET <discoveryPath>` short-circuits and returns the Manual JSON;
        the request never reaches any upstream.
    apiInstanceProxyPath:
      type: string
      default: ""
      description: |
        Optional path prefix that the API instance proxies under (the
        "Implementation URI" path component in API Manager). When set,
        the policy strips this prefix from the inbound request path
        before matching against tool paths and before computing the
        outbound URL. Example: API instance is at
        `https://gw/sap-orders-utcp`, tool path is `/api/order`. Set
        `apiInstanceProxyPath=/sap-orders-utcp` so the inbound path
        `/sap-orders-utcp/api/order` matches the tool `/api/order`.
        Leave empty if the API instance is mounted at root.
    utcpVersion:
      type: string
      default: "1.0.1"
      description: |
        Value emitted as `utcp_version` in the served Manual. Should
        reflect the UTCP spec version this policy actually targets.
    manualTitle:
      type: string
      default: ""
      description: |
        `info.title` of the synthesised Manual. Optional. Empty string
        omits the field from the served JSON.
    manualInfoVersion:
      type: string
      default: ""
      description: |
        `info.version` of the synthesised Manual. Optional.
    manualDescription:
      type: string
      default: ""
      description: |
        `info.description` of the synthesised Manual. Optional.
    upstreams:
      type: array
      default: []
      description: |
        Upstream hosts and the tools they serve. In API Manager this
        renders as a list with an Add button: each entry is one
        upstream + one or more tools below it. The policy issues
        outbound HTTP to the upstream `host` directly using the PDK
        HttpClient, so the Flex API instance's own upstream URL does
        not matter for routing — point it at any reachable host (e.g.
        `https://example.com`) and define the real targets here.
      items:
        type: object
        required:
          - host
        properties:
          host:
            type: string
            format: service
            description: |
              Upstream URL (scheme + host, optionally + base path).
              Registered as a PDK Service at policy load so the gateway
              resolves DNS and TLS. Example:
              `https://sap-orders-sys-api.example.com`.
          tools:
            type: array
            default: []
            description: |
              Tools served on this upstream. Each entry contributes one
              tool to the Manual.
            items:
              type: object
              required:
                - name
                - path
              properties:
                name:
                  type: string
                  description: |
                    Tool name. Used to route inbound requests and
                    emitted on the `<toolHeaderName>` header (default
                    `x-utcp-tool`). Should be unique across the policy.
                description:
                  type: string
                  default: ""
                  description: |
                    Free-form description. Surfaces to agents in the
                    Manual.
                method:
                  type: string
                  default: "POST"
                  description: |
                    HTTP method. Common values: GET, POST, PUT, PATCH,
                    DELETE.
                path:
                  type: string
                  description: |
                    Path on the upstream, joined with the upstream host.
                    May contain RFC 6570 path templates for path
                    parameters: `/users/{id}`. The `{id}` value is
                    pulled from the inbound request path and forwarded
                    to the upstream verbatim.
                contentType:
                  type: string
                  default: "application/json"
                  description: |
                    Content-Type header on the outbound request.
                bodyField:
                  type: string
                  default: "body"
                  description: |
                    Inputs-schema field name that carries the outbound
                    request body. Default `body`. Set empty to indicate
                    the tool has no request body.
                inputs:
                  type: string
                  default: ""
                  description: |
                    JSON Schema for the tool's inputs, as a JSON string.
                    The policy validates the inbound request against
                    this schema (subject to `validateInputs`). Typical
                    shape: `{"type":"object","required":["body"],"properties":{"body":{"type":"object",...}}}`.
                    Empty string disables validation for this tool.
    enforcementMode:
      type: string
      enum:
        - strict
        - permissive
      default: strict
      description: |
        `strict`: requests whose `(method, path)` does not correspond to
          any declared tool are rejected with HTTP 404
          `utcp.tool_not_declared`.
        `permissive`: unmatched requests are still rejected (the policy
          owns outbound routing), but the audit log records
          `utcp.unmatched=true` so operators can observe drift between
          agent traffic and the Manual.
    validateInputs:
      type: boolean
      default: true
      description: |
        Validate the request body / query / path / header against the
        matched tool's `inputs` JSON Schema. When false, the policy only
        does routing and tagging — useful when the schemas are noisy and
        the operator wants observability without enforcement.
    maxBodyBytes:
      type: integer
      minimum: 1024
      maximum: 52428800
      default: 1048576
      description: |
        Cap on the request body size when body validation is enabled.
        Bodies larger than this are rejected with HTTP 413
        `utcp.body_too_large`. Default 1 MiB; max 50 MiB.
    outboundTimeoutSeconds:
      type: integer
      minimum: 1
      maximum: 300
      default: 30
      description: |
        Timeout applied to the outbound HTTP request to the upstream.
        On timeout the policy returns HTTP 504 `utcp.upstream_timeout`.
    requirePrincipal:
      type: boolean
      default: false
      description: |
        When true, requests with no principal header are rejected with
        HTTP 401 `utcp.unauthenticated`. Use with an upstream auth
        policy (JWT, API Key) that populates `principalHeader`.
    principalHeader:
      type: string
      default: "x-anypoint-client-id"
      description: |
        Inbound header that carries the authenticated principal. Used
        in audit logs and for the `requirePrincipal` enforcement check.
    cacheControlHeader:
      type: string
      default: "public, max-age=60"
      description: |
        `Cache-Control` header value applied to the served Manual. Set
        to a stricter value like `no-store` when the Manual changes
        often.
    toolHeaderName:
      type: string
      default: "x-utcp-tool"
      description: |
        Name of the request header set on the outbound request after a
        successful tool match. Audit logs and downstream observability
        can read this to scope per-tool.
    toolNamePrefix:
      type: string
      default: ""
      description: |
        Optional prefix prepended to every tool name in the served
        Manual. Lets multiple API instances share an agent without
        tool-name collisions (`paymentsApi.getUser` vs `crmApi.getUser`).
  required:
    - upstreams
